name: ibkr-bridge

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: no
    healthcheck:
      # Two-part probe that runs every 15s after a 90s grace period.
      #
      # Part 1 — RFB banner check on port 5900 (VNC):
      #   Opens a TCP connection to x11vnc and waits up to 3s for it to send
      #   the "RFB 003.xxx" version string that every VNC server emits on accept.
      #   A plain TCP-open check (echo >/dev/tcp) is NOT enough: when x11vnc
      #   accumulates stale CLOSE_WAIT sockets it still accepts new TCP connections
      #   but never sends the banner, leaving VNC clients stuck at "Connecting".
      #   Reading the banner confirms x11vnc is actually serving clients.
      #
      # Part 2 — TCP check on port 4003 (live) or 4004 (paper):
      #   Confirms the IB Gateway Java process is up and the API is reachable.
      #   TCP-only is sufficient here because socat binds the port only after the
      #   Java process is ready to accept connections.
      test:
        - CMD-SHELL
        - >-
          bash -c 'read -t3 l < /dev/tcp/localhost/5900 &&
          echo "$$l" | grep -q "^RFB"' 2>/dev/null &&
          (bash -c 'echo > /dev/tcp/localhost/4004' 2>/dev/null ||
          bash -c 'echo > /dev/tcp/localhost/4003' 2>/dev/null)
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    environment:
      TWS_USERID: ${TWS_USERID:?Set TWS_USERID in .env}
      TWS_PASSWORD: ${TWS_PASSWORD:?Set TWS_PASSWORD in .env}
      TRADING_MODE: ${TRADING_MODE:-paper}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:?Set VNC_SERVER_PASSWORD in .env}
      TWOFA_TIMEOUT_ACTION: exit
      RELOGIN_AFTER_TWOFA_TIMEOUT: "no"
      EXISTING_SESSION_DETECTED_ACTION: primary
      READ_ONLY_API: "no"
      JAVA_HEAP_SIZE: ${JAVA_HEAP_SIZE:-}
      TZ: ${TIME_ZONE:-America/New_York}
    expose:
      - "4003"
      - "4004"
      - "5900"

  novnc:
    image: theasp/novnc@sha256:31fd84fe67c2d42b5a4cdd0f770c6200d774d3382443bcd04831ad1294ea4cbe
    restart: always
    depends_on:
      ib-gateway:
        condition: service_healthy
    healthcheck:
      # RFB banner probe: connects to x11vnc inside ib-gateway and reads the
      # "RFB 003.xxx" version string (3s timeout). Same reasoning as the
      # ib-gateway healthcheck above — a TCP-only check passes even when x11vnc
      # is stuck and not serving clients. autoheal uses this to restart novnc
      # when the VNC backend is broken.
      test:
        - CMD
        - python3
        - -c
        - >-
          import socket; s = socket.socket(); s.settimeout(3);
          s.connect(('ib-gateway', 5900));
          b = s.recv(16); s.close();
          assert b.startswith(b'RFB'), b
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "autoheal=true"
    environment:
      DISPLAY_WIDTH: 1024
      DISPLAY_HEIGHT: 768
      RUN_XTERM: "no"
    expose:
      - "8080"
    volumes:
      - ./infra/novnc/index.html:/usr/share/novnc/index.html:ro
    entrypoint:
      ["websockify", "--web", "/usr/share/novnc", "8080", "ib-gateway:5900"]

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - novnc
    ports:
      - "80:80"
      - "443:443"
    entrypoint: /bin/sh
    command: ["/etc/caddy/docker-entrypoint.sh"]
    environment:
      VNC_DOMAIN: ${VNC_DOMAIN:?Set VNC_DOMAIN in .env}
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN in .env}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:?Set VNC_SERVER_PASSWORD in .env}
      VNC_BASIC_AUTH_USER: ${VNC_BASIC_AUTH_USER:-admin}
    volumes:
      - ./infra/caddy/docker-entrypoint.sh:/etc/caddy/docker-entrypoint.sh:ro
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/sites/:/etc/caddy/sites/:ro
      - ./infra/caddy/domains/:/etc/caddy/domains/:ro
      - /opt/caddy-shared/sites/:/etc/caddy/shared-sites/:ro
      - /opt/caddy-shared/domains/:/etc/caddy/shared-domains/:ro
      - caddy-data:/data
      - caddy-config:/config

  bridge:
    build:
      context: .
      dockerfile: services/bridge/Dockerfile
    restart: always
    depends_on:
      ib-gateway:
        condition: service_healthy
    environment:
      IB_HOST: ib-gateway
      IB_LIVE_PORT: "4003"
      IB_PAPER_PORT: "4004"
      TRADING_MODE: ${TRADING_MODE:-paper}
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      WS_BUFFER_SIZE: ${WS_BUFFER_SIZE:-500}
      WS_MAX_SUBSCRIBERS: ${WS_MAX_SUBSCRIBERS:-10}
      WS_HEARTBEAT_INTERVAL: ${WS_HEARTBEAT_INTERVAL:-30}
    expose:
      - "5000"

  gateway-controller:
    build: ./infra/gateway-controller
    restart: always
    environment:
      COMPOSE_PROJECT_NAME: ibkr-bridge
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ALERT_REPORT_EMAIL_TO: ${ALERT_REPORT_EMAIL_TO:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "9000"

  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 15
      AUTOHEAL_START_PERIOD: 0

volumes:
  caddy-data:
  caddy-config:

networks:
  default:
    name: ${SHARED_NETWORK:-}
