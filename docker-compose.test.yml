# E2E test overrides — applied on top of docker-compose.yml.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml ...
# See Makefile E2E_COMPOSE for the full invocation.

services:
  ib-gateway:
    restart: "no"
    environment:
      TWS_USERID: ${TWS_USERID:?Set TWS_USERID in .env.test}
      TWS_PASSWORD: ${TWS_PASSWORD:?Set TWS_PASSWORD in .env.test}
      TRADING_MODE: paper
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-test}
      TWOFA_TIMEOUT_ACTION: exit
      RELOGIN_AFTER_TWOFA_TIMEOUT: "no"
      EXISTING_SESSION_DETECTED_ACTION: primary
      READ_ONLY_API: "no"

  bridge:
    restart: "no"
    environment:
      IB_HOST: ib-gateway
      IB_LIVE_PORT: "4003"
      IB_PAPER_PORT: "4004"
      TRADING_MODE: paper
      API_TOKEN: test-token
    ports:
      - "15010:5000"
    volumes:
      - ./services/bridge/main.py:/app/main.py:ro
      - ./services/bridge/bridge_models.py:/app/bridge_models.py:ro
      - ./services/bridge/client:/app/client:ro
      - ./services/bridge/bridge_routes:/app/bridge_routes:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  # Disable production-only services
  novnc:
    profiles: ["disabled"]
  caddy:
    profiles: ["disabled"]
  gateway-controller:
    profiles: ["disabled"]
